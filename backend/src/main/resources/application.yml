spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ngu_coc_huong_que
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2

server:
  port: 8081

logging:
  level:
    com.ngucochuongque: INFO
